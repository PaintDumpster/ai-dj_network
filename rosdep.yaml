# Custom rosdep keys for AI DJ project
# This file defines dependencies that may not be in the standard rosdep database

python3-fastapi:
  ubuntu:
    pip:
      packages: [fastapi>=0.104.0]
  debian:
    pip:
      packages: [fastapi>=0.104.0]

python3-uvicorn:
  ubuntu:
    pip:
      packages: ['uvicorn[standard]>=0.24.0']
  debian:
    pip:
      packages: ['uvicorn[standard]>=0.24.0']

python3-websockets:
  ubuntu:
    focal: [python3-websockets]
    jammy: [python3-websockets]
    noble: [python3-websockets]
    pip:
      packages: [websockets>=12.0]
  debian:
    bullseye: [python3-websockets]
    bookworm: [python3-websockets]
    pip:
      packages: [websockets>=12.0]
