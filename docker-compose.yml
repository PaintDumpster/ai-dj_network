services:
  ai-dj:
    build: .
    image: ai-dj:latest
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    devices:
      - /dev/ttyACM0:/dev/ttyACM0   # Arduino Uno — keypad input
      - /dev/ttyACM1:/dev/ttyACM1   # Pico 1 — LED clusters 1-3 (port may vary)
      - /dev/ttyACM2:/dev/ttyACM2   # Pico 2 — LED clusters 4-5 (port may vary)
    volumes:
      - ./models:/ros2_ws/models:ro   # ONNX model files (read-only)
      - ./sounds:/ros2_ws/sounds:ro   # Audio sample files (read-only)
    # host networking is required for ROS2 DDS multicast (UDP discovery)
    network_mode: host
